services:
  who-has-time:
    build: .
    container_name: who-has-time-local
    restart: "no"
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: sqlite:////data/who_has_time.db
      SECRET_KEY: dev-local-secret-change-me
      APP_BASE_URL: http://localhost:8080
      BEHIND_PROXY: "0"
      WHT_ALLOW_DEV_SECRET: "1"
    volumes:
      - ./data:/data
